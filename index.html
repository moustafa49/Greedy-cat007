<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Greedy Cat AI FINAL</title>
<style>
body{font-family:Arial;background:#020617;color:#fff;text-align:center;padding:10px}
h1{color:#22c55e}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}
button{font-size:24px;padding:14px;border:none;border-radius:12px;background:#0f172a;color:#fff}
.active{background:#14532d!important;outline:3px solid #22c55e;transform:scale(1.1)}
.section{border:1px solid #111827;margin-top:10px;padding:10px;border-radius:10px}
#history{font-size:22px;line-height:1.6}
canvas{background:#000;border-radius:10px}
</style>
</head>
<body>

<h1>🐱 Greedy Cat AI FINAL</h1>

<div class="grid">
<button id="corn" onclick="add('corn')">🌽</button>
<button id="tomato" onclick="add('tomato')">🍅</button>
<button id="carrot" onclick="add('carrot')">🥕</button>
<button id="pepper" onclick="add('pepper')">🌶️</button>
<button id="fish" onclick="add('fish')">🐟</button>
<button id="shrimp" onclick="add('shrimp')">🦐</button>
<button id="cow" onclick="add('cow')">🐄</button>
<button id="chicken" onclick="add('chicken')">🐔</button>
</div>

<button id="botBtn" onclick="toggleBot()">Bot: OFF</button>
<button onclick="reset()">Reset</button>

<div class="section">History: <div id="history"></div></div>
<div class="section">Prediction: <div id="pred"></div></div>
<div class="section">WHY: <div id="why"></div></div>
<div class="section">Top5: <div id="top5"></div></div>
<div class="section">Top6: <div id="top6"></div></div>
<div class="section">Wave/Trap: <div id="state"></div></div>
<div class="section">Monte Carlo: <div id="monte"></div></div>
<div class="section"><canvas id="radar" width="300" height="300"></canvas></div>

<script>
// ===== DATA =====
const foods=["corn","tomato","carrot","pepper","fish","shrimp","cow","chicken"]
const veg=["corn","tomato","carrot","pepper"]
const meat=["fish","shrimp","cow","chicken"]

const emoji={
corn:"🌽",tomato:"🍅",carrot:"🥕",pepper:"🌶️",
fish:"🐟",shrimp:"🦐",cow:"🐄",chicken:"🐔"
}

const value={corn:5,tomato:5,carrot:5,pepper:5,fish:8,shrimp:10,cow:15,chicken:45}

// ===== STATE =====
let history=JSON.parse(localStorage.getItem("h")||"[]")
let trans=JSON.parse(localStorage.getItem("t")||"{}")
let bot=false
let botInterval=null

function save(){
localStorage.setItem("h",JSON.stringify(history))
localStorage.setItem("t",JSON.stringify(trans))
}

// ===== ADD =====
function add(f){
if(history.length){
let prev=history[history.length-1]
if(!trans[prev]) trans[prev]={}
trans[prev][f]=(trans[prev][f]||0)+1
}
history.push(f)
if(history.length>200)history.shift()
save()
update()
}

// ===== AI CORE =====
function absence(f){
let i=history.lastIndexOf(f)
return i===-1?history.length:history.length-i
}

function momentum(f){
return history.slice(-5).filter(x=>x===f).length
}

function pattern(f){
let s=0
for(let i=0;i<history.length-2;i++){
if(history[i]===history[i+1] && history[i+2]===f) s+=3
}
return s
}

function transitionScore(f){
let last=history[history.length-1]
if(!trans[last]) return 0
let total=Object.values(trans[last]).reduce((a,b)=>a+b,0)
return total?((trans[last][f]||0)/total)*5:0
}

function score(f){
if(history.length<5) return value[f]*10

let s=0
s+=value[f]*3
s+=momentum(f)*value[f]
s+=pattern(f)*2
s+=transitionScore(f)*value[f]
s+=Math.min(absence(f),10)
return s
}

// ===== AI =====
function predict(){
let scores={}
foods.forEach(f=>scores[f]=score(f))
let sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1])
return {scores,sorted,best:sorted[0][0],alt:sorted[1][0]}
}

// ===== ANALYSIS =====
function wave(){
let last=history.slice(-10)
let v=last.filter(x=>veg.includes(x)).length
let m=last.filter(x=>meat.includes(x)).length
return v>m?"Veg Wave":"Meat Wave"
}

function trap(){
let last=history.slice(-5)
return new Set(last).size<=2?"Trap":"Normal"
}

// ===== MONTE =====
function monte(scores){
let sim={}
foods.forEach(f=>sim[f]=0)
let total=Object.values(scores).reduce((a,b)=>a+b,0)
if(total===0){foods.forEach(f=>sim[f]=12.5);return sim}

for(let i=0;i<1000;i++){
let r=Math.random()*total
let c=0
for(let f of foods){
c+=scores[f]
if(r<=c){sim[f]++;break}
}
}
foods.forEach(f=>sim[f]=(sim[f]/10).toFixed(1))
return sim
}

// ===== UI =====
function update(){

// history
document.getElementById("history").innerHTML=
history.slice(-20).map(x=>emoji[x]).join(" ")

let p=predict()
let sorted=p.sorted

// top5
let vegTop=sorted.filter(x=>veg.includes(x[0])).slice(0,3).map(x=>x[0])
let meatTop=sorted.filter(x=>meat.includes(x[0])).slice(0,2).map(x=>x[0])
let top5=[...vegTop,...meatTop]

// top6
let meat3=sorted.filter(x=>meat.includes(x[0])).slice(0,3).map(x=>x[0])
let top6=[...vegTop,...meat3]

// why
let why="Val:"+value[p.best]+" Mom:"+momentum(p.best)+" Abs:"+absence(p.best)

// render
document.getElementById("pred").innerHTML=emoji[p.best]+" OR "+emoji[p.alt]
document.getElementById("why").innerHTML=why
document.getElementById("top5").innerHTML=top5.map(x=>emoji[x]).join(" ")
document.getElementById("top6").innerHTML=top6.map(x=>emoji[x]).join(" ")
document.getElementById("state").innerHTML=wave()+" / "+trap()

let mc=monte(p.scores)
document.getElementById("monte").innerHTML=
foods.map(f=>emoji[f]+" "+mc[f]+"%").join(" | ")

// radar
let ctx=document.getElementById("radar").getContext("2d")
ctx.clearRect(0,0,300,300)
let max=Math.max(...Object.values(p.scores))
let c=150,r=100
foods.forEach((f,i)=>{
let a=(i/foods.length)*2*Math.PI
let v=p.scores[f]/max
let x=c+Math.cos(a)*r*v
let y=c+Math.sin(a)*r*v
ctx.beginPath();ctx.moveTo(c,c);ctx.lineTo(x,y)
ctx.strokeStyle="#22c55e";ctx.stroke()
})
}

// ===== BOT LOOP =====
function runBot(){
let p=predict()
let diff=Math.abs(p.scores[p.best]-p.scores[p.alt])

foods.forEach(f=>{
let el=document.getElementById(f)
if(el) el.classList.remove("active")
})

if(diff>2){
let el=document.getElementById(p.best)
if(el) el.classList.add("active")
add(p.best)
}
}

function toggleBot(){
bot=!bot
let btn=document.getElementById("botBtn")

if(bot){
btn.innerText="Bot: ON"
botInterval=setInterval(runBot,1500)
}else{
btn.innerText="Bot: OFF"
clearInterval(botInterval)
}
}

// ===== RESET =====
function reset(){
history=[]
trans={}
save()
update()
}

update()
</script>
</body>
</html>
